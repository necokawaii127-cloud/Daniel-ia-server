<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daniel ❤️</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="chat">

    <div class="header">

        <div class="avatar">
    <img src="img/file_00000000fc64720e9b7f4255b7be3ccc.png" alt="Daniel">
        </div>
        <div class="info">
            <div class="nombre">Daniel ❤️</div>
            <div class="estado">🟢 En línea</div>
        </div>

    </div>

    <div id="respuesta"></div>

    <div class="barra">

        <input
        id="mensaje"
        placeholder="Escribe un mensaje..."
        onkeydown="if(event.key==='Enter') enviar();">

        <button onclick="enviar()">➤</button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
